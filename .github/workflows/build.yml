name: Build kernel modules

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kernel:
          - "6.4.3"
          - "6.11.1"
          - "6.16.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison bc libelf-dev libssl-dev

      - name: Prepare kernel source
        run: |
          MAJOR=$(echo "${{ matrix.kernel }}" | cut -d. -f1)
          wget -q "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${{ matrix.kernel }}.tar.xz"
          tar xf "linux-${{ matrix.kernel }}.tar.xz"
          cd "linux-${{ matrix.kernel }}"
          make defconfig
          make modules_prepare

      - name: Build modules
        run: make -C kmods KDIR="$(pwd)/linux-${{ matrix.kernel }}" KBUILD_MODPOST_WARN=1 kmods
